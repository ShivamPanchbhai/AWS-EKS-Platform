name: Infra + App Deploy (ECR + ASG)

on:
  push:
    branches:
      - main

# Required for GitHub OIDC authentication
# id-token: write -> allows GitHub to request OIDC token
# contents: read -> required to checkout repository
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      ############################################################
      # 1️⃣ Checkout repository
      # Pulls Dockerfile + application code + Terraform configs
      ############################################################
      - name: Checkout repository
        uses: actions/checkout@v4

      ############################################################
      # 2️⃣ Authenticate to AWS via OIDC
      # No long-lived access keys used
      # GitHub assumes pre-created IAM role
      ############################################################
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::306991549269:role/github-actions-deploy-role
          aws-region: ap-south-1

      ############################################################
      # 3️⃣ Login to ECR
      # Required before pushing Docker images
      ############################################################
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-south-1 \
          | docker login --username AWS --password-stdin 306991549269.dkr.ecr.ap-south-1.amazonaws.com

      ############################################################
      # 4️⃣ Build Docker image
      # Tag image with unique Git commit SHA for immutability
      ############################################################
      - name: Build Docker image
        run: |
          docker build -t ehr-service:${{ github.sha }} .

      ############################################################
      # 5️⃣ Tag image for ECR repository
      ############################################################
      - name: Tag Docker image
        run: |
          docker tag ehr-service:${{ github.sha }} \
          306991549269.dkr.ecr.ap-south-1.amazonaws.com/ehr-service:${{ github.sha }}

      ############################################################
      # 6️⃣ Push image to ECR
      # Image is now versioned and immutable
      ############################################################
      - name: Push Docker image to ECR
        run: |
          docker push 306991549269.dkr.ecr.ap-south-1.amazonaws.com/ehr-service:${{ github.sha }}

      ############################################################
      # 7️⃣ Setup Terraform
      ############################################################
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      ############################################################
      # 8️⃣ Initialize Terraform
      # Connects to remote S3 backend state
      ############################################################
      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      ############################################################
      # 9️⃣ Apply Infrastructure Changes
      # Pass Docker image tag into ASG launch template
      ############################################################
      - name: Terraform Apply
        run: terraform apply -auto-approve -var="image_tag=${{ github.sha }}"
        working-directory: terraform

      ############################################################
      # 🔟 Trigger ASG Instance Refresh
      # Forces rolling replacement of EC2 instances
      # New instances pull the newly pushed ECR image
      ############################################################
      - name: Start ASG Instance Refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name EC2-ASG
