name: App Deploy (ECR + ASG)

on:
  push:
    branches:
      - main
    paths:
      - "app/**"

  workflow_dispatch:

permissions:
   id-token: write
   contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      ########################################################
      # 1️⃣ Checkout
      ########################################################
      - name: Checkout repository
        uses: actions/checkout@v4

      ########################################################
      # 2️⃣ OIDC Authentication
      ########################################################
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::306991549269:role/github-actions-deploy-role
          aws-region: ap-south-1

      ########################################################
      # 3️⃣ Login to ECR
      ########################################################
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      ########################################################
      # 4️⃣ Build Docker Image
      ########################################################
      - name: Build Docker image
        run: |
          docker build -t ehr-service:${{ github.sha }} ./app

      ########################################################
      # 5️⃣ Tag Image
      ########################################################
      - name: Tag Docker image
        run: |
          docker tag ehr-service:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/ehr-service:${{ github.sha }}

      ########################################################
      # 6️⃣ Push Image
      ########################################################
      - name: Push Docker image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/ehr-service:${{ github.sha }}

      ########################################################
      # 7️⃣ Terraform Apply (Update image_tag)
      ########################################################
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply (Image Update)
        run: terraform apply -auto-approve -var="image_tag=${{ github.sha }}"
        working-directory: terraform
