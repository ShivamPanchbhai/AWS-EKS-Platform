name: App Deploy (ECR + ASG)

on:
  push:
    branches:
      - main
    paths:
      - "app/**"

  workflow_dispatch:

permissions:
   id-token: write
   contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
      ########################################################
      # 1️) Checkout
      ########################################################
      - name: Checkout repository
        uses: actions/checkout@v5

      ########################################################
      # 2️) OIDC Authentication
      ########################################################
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::306991549269:role/github-actions-deploy-role
          aws-region: ap-south-1

      ########################################################
      # 3️) Login to ECR
      ########################################################
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      ########################################################
      # 4️) Build Docker Image
      ########################################################
      - name: Build Docker image
        run: |
          docker build -t ehr-service:${{ github.sha }} ./app

      ########################################################
      # 5️) Set Image tag | "remember the tag"
      ########################################################
      - name: Set image tag
        id: set_tag
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      ########################################################
      # 6) Tag docker Image | "prepare the image to push"
      ########################################################

      - name: Tag Docker image for ECR
        run: |
         docker tag ehr-service:${{ github.sha }} \
         ${{ steps.login-ecr.outputs.registry }}/ehr-service:${{ github.sha }}

      ########################################################
      # 7) Push Image
      ########################################################
      - name: Push Docker image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/ehr-service:${{ github.sha }}
    