name: Destroy Infrastructure (Manual Approval Required)

############################################################
# This workflow is intentionally MANUAL.
# It will NOT run on push or PR.
# It requires explicit confirmation to prevent accidents.
############################################################

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to permanently delete all Terraform-managed infrastructure"
        required: true
        default: ""

############################################################
# Required for GitHub OIDC authentication to AWS
############################################################
permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    ########################################################
    # Only run if exact confirmation string is provided.
    # Prevents accidental or malicious execution.
    ########################################################
    if: ${{ inputs.confirm == 'DESTROY' }}
    runs-on: ubuntu-latest

    steps:

      ######################################################
      # 1️⃣ Checkout repository (Terraform configuration)
      ######################################################
      - name: Checkout repository
        uses: actions/checkout@v4

      ######################################################
      # 2️⃣ Authenticate to AWS via OIDC
      # Uses pre-created github-actions-deploy-role
      # No static credentials involved
      ######################################################
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::306991549269:role/github-actions-deploy-role
          aws-region: ap-south-1

      ######################################################
      # 3️⃣ Setup Terraform CLI
      ######################################################
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      ######################################################
      # 4️⃣ Initialize Terraform backend (S3 state)
      ######################################################
      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      ######################################################
      # 5️⃣ Destroy all resources managed by Terraform
      # -auto-approve is safe here because we already
      # enforced manual confirmation above.
      ######################################################
      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: terraform
