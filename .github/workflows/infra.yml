############################################################
# INFRASTRUCTURE DEPLOYMENT WORKFLOW
#
# Purpose:
# Deploy or update AWS infrastructure using Terraform.
#
# Trigger:

# Change in terraform → infra runs 
# App deploy completes → infra runs 
############################################################

name: Infra Deploy

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"

  workflow_run:
    workflows: ["App Deploy (ECR + ASG)"]
    types:
      - completed

############################################################
# Required for GitHub OIDC authentication
#
# id-token: write -> allows GitHub to request OIDC token
# contents: read  -> allows repo checkout
############################################################
permissions:
  id-token: write
  contents: read

jobs:
  infra:
    runs-on: ubuntu-latest

    steps:

      ########################################################
      # 1️⃣ Checkout Repository
      # Pull latest Terraform configuration
      ########################################################
      - name: Checkout repository
        uses: actions/checkout@v4

      ########################################################
      # 2️⃣ Authenticate to AWS via OIDC
      # No static access keys used.
      # GitHub assumes pre-created deploy IAM role.
      ########################################################
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::306991549269:role/github-actions-deploy-role
          aws-region: ap-south-1

      ########################################################
      # 3️⃣ Setup Terraform CLI
      ########################################################
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      ########################################################
      # 4️⃣ Initialize Terraform
      # Connects to remote S3 backend
      ########################################################
      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      ########################################################
      # 5️⃣ Apply Infrastructure Changes
      # Creates or updates AWS resources
      ########################################################
      - name: Terraform Apply
        run: terraform apply -auto-approve -var="image_tag=latest"
        working-directory: terraform
