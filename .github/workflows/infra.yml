############################################################
# INFRASTRUCTURE DEPLOYMENT WORKFLOW
#
# Purpose:
# Deploy or update AWS infrastructure using Terraform.
#
# Trigger:

# Change in terraform → infra runs 
# App deploy completes → infra runs 
############################################################

name: Infra Deploy

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"

  workflow_run:
    workflows: ["App Deploy (ECR + ASG)"]
    types:
      - completed

  workflow_dispatch:      # enables manual run button for this workflow

############################################################
# Required for GitHub OIDC authentication
#
# id-token: write -> allows GitHub to request OIDC token
# contents: read  -> allows repo checkout
############################################################
permissions:
  id-token: write
  contents: read

jobs:
  infra:
    # This condition handles TWO trigger types:
    #
    # 1. push → when terraform/** changes
    #    → always run infra
    #
    # 2. workflow_run → triggered after app workflow
    #    → run ONLY if app workflow succeeded
    #
    # Why needed:
    # Without this, GitHub tries to evaluate workflow_run fields
    # even during push events → breaks OIDC / job execution
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    runs-on: ubuntu-latest
    
    steps:

      ########################################################
      # 1️) Checkout Repository
      # Pull latest Terraform configuration
      ########################################################
      - name: Checkout repository
        uses: actions/checkout@v5

      ########################################################
      # 2️) Authenticate to AWS via OIDC
      # No static access keys used.
      # GitHub assumes pre-created deploy IAM role.
      ########################################################
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::306991549269:role/github-actions-deploy-role
          aws-region: ap-south-1

      ########################################################
      # 3️) Setup Terraform CLI
      ########################################################
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      ########################################################
      # 4️) Initialize Terraform
      # Connects to remote S3 backend
      ########################################################
      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      ########################################################
      # 5️) Apply Infrastructure Changes
      # Creates or updates AWS resources
      ########################################################
      - name: Terraform Apply
        run: terraform apply -auto-approve -var="image_tag=${IMAGE_TAG}"
        working-directory: terraform
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha  }}
