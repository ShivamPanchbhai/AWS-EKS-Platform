############################################################
# STORAGE CLASS
# Defines gp3 as the default storage class for the cluster
# gp3 is faster and cheaper than gp2 -- AWS recommends it
# Used by Prometheus and Grafana for persistent EBS volumes
############################################################
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    # Makes gp3 the default storage class for the cluster
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  # EBS volume type
  type: gp3
  # Encryption at rest using AWS managed KMS key
  encrypted: "true"
volumeBindingMode: WaitForFirstConsumer
# Retain volume if PVC is deleted -- prevents accidental data loss
reclaimPolicy: Retain