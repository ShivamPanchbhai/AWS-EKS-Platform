
# All templates reference values from here

############################################################
# APPLICATION VALUES
############################################################

replicaCount: 2 # minimum two pods for high availability across app nodes

image:
  # Placeholder - CI/CD pipeline overrides this with actual ECR URL and tag
  repository: ""
  tag: ""
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

############################################################
# INGRESS
# AWS Load Balancer Controller reads these annotations
# and provisions an ALB automatically with health checks integrated
############################################################

ingress:
  enabled: true
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}, {"HTTP": 80}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: ""  # Populated from root main.tf output
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
  host: "shivam.store"

############################################################
# RESOURCE LIMITS
# t3.medium nodes have 2 vCPU, 4GB RAM
# t3.medium with 2 vCPU (2000m total), we could theoretically schedule
# up to 20 pods based on CPU requests alone (20 x 100m = 2000m), 
# but each pod can burst up to 500m when needed. 
# Memory works the same way -- 4GB total, 
# each pod guaranteed 128Mi but capped at 512Mi.

# These limits ensure no single pod starves the node

# 100m means 100 millicores which is 0.1 of a single CPU core. 
# So the pod is guaranteed 10% of one CPU core and can burst 
# up to 50%(500m)if the node has spare capacity.

# Requests 
#what the pod is guaranteed and what Kubernetes uses to decide 
# which node to schedule the pod on. If a node doesn't have 100m CPU 
# and 128Mi memory free, the pod won't land there.

# Limits
# the hard ceiling. If the pod tries to use more than 500m CPU,
# Kubernetes throttles it. If it tries to use more than 512Mi memory,
# Kubernetes kills the pod with an OOMKilled error.
############################################################

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

############################################################
# HORIZONTAL POD AUTOSCALER
# Mirrors existing ASG CPU target tracking policy
############################################################

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

############################################################
# Liveness probe
# Kubelet hits the health endpoint every 10 seconds. If it gets 3 consecutive failures, 
# it does not "kill the pod" permanently -- it restarts the container inside the pod.

# Readiness probe
# Kubelet waits 15 seconds after container start before it begins checking. Then it hits the health endpoint every 5 seconds. 
# If it fails, it does not restart anything -- it removes the pod from the Service's endpoint list, 
# meaning the load balancer stops sending traffic to it. Once checks pass again, the pod is added back.
############################################################

probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 5
    failureThreshold: 3

############################################################
# SERVICE ACCOUNT
############################################################

serviceAccount:
  name: ehr-app

############################################################
# NAMESPACE
############################################################

namespace: ehr