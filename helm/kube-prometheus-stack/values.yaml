############################################################
# KUBE-PROMETHEUS-STACK OVERRIDE VALUES
# Community chart -- these values override the chart defaults
# Deploys Prometheus, Alertmanager, Grafana, and Node Exporter
# All monitoring components pinned to the dedicated monitoring node
############################################################

############################################################
# PROMETHEUS
############################################################
prometheus:
  prometheusSpec:

    ############################################################
    # PIN TO MONITORING NODE
    # Toleration allows Prometheus to land on the tainted monitoring node
    # NodeAffinity ensures it specifically targets the monitoring node
    ############################################################
    tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "monitoring"
        effect: "NoSchedule"

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: "dedicated"
                  operator: "In"
                  values:
                    - "monitoring"

    ############################################################
    # PERSISTENT STORAGE
    # EBS CSI driver provisions a gp3 EBS volume automatically
    # Metrics survive Prometheus pod restarts
    ############################################################
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    ############################################################
    # RETENTION
    # How long Prometheus keeps metrics before discarding them
    ############################################################
    retention: 15d

    ############################################################
    # SCRAPE INTERVAL
    # How often Prometheus scrapes metrics from targets
    ############################################################
    scrapeInterval: "30s"

############################################################
# ALERTMANAGER
# Routes alerts fired by Prometheus to Gmail via SMTP
############################################################
alertmanager:
  alertmanagerSpec:

    # Mount the Kubernetes Secret created by ESO into the Alertmanager pod
    secrets:
      - alertmanager-smtp-secret

    tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "monitoring"
        effect: "NoSchedule"

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: "dedicated"
                  operator: "In"
                  values:
                    - "monitoring"

  config:
    global:
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "panchbhaishivam@gmail.com"
      smtp_auth_username: "panchbhaishivam@gmail.com"
      smtp_require_tls: true
      # Reads password from the mounted secret file
      smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-smtp-secret/smtp_password

    route:
      receiver: "email"
      group_wait: 5m
      group_interval: 10m
      repeat_interval: 3h

    receivers:
      - name: "email"
        email_configs:
          - to: "panchbhaishivam@gmail.com"
            send_resolved: true

############################################################
# GRAFANA
# Visualization layer for Prometheus metrics
############################################################
grafana:
  enabled: true

  # Pin to monitoring node
  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "monitoring"
      effect: "NoSchedule"

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: "dedicated"
                operator: "In"
                values:
                  - "monitoring"

  # Default admin password -- change this before deploying
  adminPassword: "changeme"

  ############################################################
  # PERSISTENT STORAGE FOR GRAFANA
  # Persists dashboards and datasource config across pod restarts
  ############################################################
  persistence:
    enabled: true
    storageClassName: gp3
    size: 5Gi

############################################################
# NODE EXPORTER
# Runs as a DaemonSet on every node
# Scrapes node-level metrics -- CPU, memory, disk, network
# No node pinning needed since it runs on all nodes by design
############################################################
nodeExporter:
  enabled: true

############################################################
# KUBE STATE METRICS
# Scrapes Kubernetes object metrics -- pod status, deployment
# replicas, HPA state etc.
############################################################
kubeStateMetrics:
  enabled: true